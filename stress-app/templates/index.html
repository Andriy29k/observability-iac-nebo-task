<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Stress Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c0f;
    --panel:     #0f1318;
    --border:    #1e2530;
    --accent:    #00e5ff;
    --warn:      #ffb300;
    --danger:    #ff3d3d;
    --ok:        #00e676;
    --text:      #c8d6e5;
    --dim:       #4a5568;
    --cpu-color: #00e5ff;
    --ram-color: #b388ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 39px, rgba(255,255,255,0.02) 40px);
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 860px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 36px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
  }
  header h1 span { color: var(--accent); }
  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  /* ── Live gauges ── */
  .gauges {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 36px;
  }

  .gauge-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .gauge-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
  }
  .gauge-card.cpu::before { background: var(--cpu-color); }
  .gauge-card.ram::before { background: var(--ram-color); }

  .gauge-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-bottom: 8px;
  }
  .gauge-value {
    font-size: 3.2rem;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 12px;
    transition: color 0.4s;
  }
  .gauge-card.cpu .gauge-value { color: var(--cpu-color); }
  .gauge-card.ram .gauge-value { color: var(--ram-color); }
  .gauge-value.warn  { color: var(--warn)   !important; }
  .gauge-value.danger{ color: var(--danger) !important; }

  .bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    width: 0%;
    transition: width 1s linear, background 0.4s;
    border-radius: 0;
  }
  .gauge-card.cpu .bar-fill  { background: var(--cpu-color); }
  .gauge-card.ram .bar-fill  { background: var(--ram-color); }
  .bar-fill.warn   { background: var(--warn)   !important; }
  .bar-fill.danger { background: var(--danger) !important; }

  .gauge-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    margin-top: 8px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }
  .gauge-status .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    background: var(--dim);
    animation: none;
  }
  .gauge-status .dot.active {
    background: var(--ok);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  /* ── Control panels ── */
  .controls {
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .control-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-header .icon {
    font-size: 1rem;
  }
  .panel-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .cpu-panel .panel-header h2 { color: var(--cpu-color); }
  .ram-panel .panel-header h2 { color: var(--ram-color); }

  .btn-group {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stress-btn {
    width: 100%;
    padding: 14px 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .stress-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .stress-btn:hover { border-color: currentColor; }
  .stress-btn:hover::before { opacity: 0.06; }
  .stress-btn:active { transform: scale(0.98); }

  .stress-btn.active {
    border-color: currentColor;
  }
  .stress-btn.active::before { opacity: 0.1; }
  .stress-btn.active .btn-indicator { opacity: 1; animation: pulse 0.8s infinite; }

  /* CPU button colors */
  .cpu-panel .btn-high  { color: var(--danger); }
  .cpu-panel .btn-high::before  { background: var(--danger); }
  .cpu-panel .btn-med   { color: var(--warn); }
  .cpu-panel .btn-med::before   { background: var(--warn); }
  .cpu-panel .btn-low   { color: var(--ok); }
  .cpu-panel .btn-low::before   { background: var(--ok); }

  /* RAM button colors */
  .ram-panel .btn-high  { color: var(--danger); }
  .ram-panel .btn-high::before  { background: var(--danger); }
  .ram-panel .btn-med   { color: var(--warn); }
  .ram-panel .btn-med::before   { background: var(--warn); }
  .ram-panel .btn-low   { color: #b388ff; }
  .ram-panel .btn-low::before   { background: #b388ff; }

  .btn-label { display: flex; align-items: center; gap: 10px; }
  .btn-level-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 2px 6px;
    border: 1px solid currentColor;
    opacity: 0.6;
  }
  .btn-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0;
    flex-shrink: 0;
  }

  /* ── Stop All ── */
  .stop-all-wrap {
    width: 100%;
    max-width: 860px;
  }
  .stop-all-btn {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .stop-all-btn:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  /* ── Log ── */
  .log-section {
    width: 100%;
    max-width: 860px;
    margin-top: 24px;
  }
  .log-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .log-box {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 16px;
    height: 140px;
    overflow-y: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.7;
    color: var(--dim);
  }
  .log-box .log-line { display: flex; gap: 12px; }
  .log-box .log-time { color: #2d3748; flex-shrink: 0; }
  .log-box .log-msg.ok     { color: var(--ok); }
  .log-box .log-msg.warn   { color: var(--warn); }
  .log-box .log-msg.danger { color: var(--danger); }
  .log-box .log-msg.info   { color: var(--accent); }
  .log-box .log-msg.stop   { color: var(--dim); }
</style>
</head>
<body>

<header>
  <h1>VM <span>STRESS</span> TESTER</h1>
  <span class="header-tag">// AZURE MONITORING LAB</span>
</header>

<!-- Live Gauges -->
<div class="gauges">
  <div class="gauge-card cpu">
    <div class="gauge-label">// CPU UTILIZATION</div>
    <div class="gauge-value" id="cpu-val">0<span style="font-size:1.4rem;font-weight:300">%</span></div>
    <div class="bar-track"><div class="bar-fill" id="cpu-bar"></div></div>
    <div class="gauge-status">
      <span class="dot" id="cpu-dot"></span>
      <span id="cpu-status-txt">IDLE</span>
    </div>
  </div>
  <div class="gauge-card ram">
    <div class="gauge-label">// MEMORY UTILIZATION</div>
    <div class="gauge-value" id="ram-val">0<span style="font-size:1.4rem;font-weight:300">%</span></div>
    <div class="bar-track"><div class="bar-fill" id="ram-bar"></div></div>
    <div class="gauge-status">
      <span class="dot" id="ram-dot"></span>
      <span id="ram-status-txt">IDLE</span>
    </div>
  </div>
</div>

<!-- Control Buttons -->
<div class="controls">
  <!-- CPU Panel -->
  <div class="control-panel cpu-panel">
    <div class="panel-header">
      <span class="icon">⚡</span>
      <h2>CPU Stress</h2>
    </div>
    <div class="btn-group">
      <button class="stress-btn btn-high" onclick="stressCpu('high')" id="cpu-btn-high">
        <div class="btn-label">
          <span class="btn-level-tag">HIGH</span>
          CPU: High Usage
        </div>
        <div class="btn-indicator"></div>
      </button>
      <button class="stress-btn btn-med" onclick="stressCpu('med')" id="cpu-btn-med">
        <div class="btn-label">
          <span class="btn-level-tag">MED</span>
          CPU: Medium Usage
        </div>
        <div class="btn-indicator"></div>
      </button>
      <button class="stress-btn btn-low" onclick="stressCpu('low')" id="cpu-btn-low">
        <div class="btn-label">
          <span class="btn-level-tag">LOW</span>
          CPU: Low Usage
        </div>
        <div class="btn-indicator"></div>
      </button>
    </div>
  </div>

  <!-- RAM Panel -->
  <div class="control-panel ram-panel">
    <div class="panel-header">
      <span class="icon">🧠</span>
      <h2>RAM Stress</h2>
    </div>
    <div class="btn-group">
      <button class="stress-btn btn-high" onclick="stressRam('high')" id="ram-btn-high">
        <div class="btn-label">
          <span class="btn-level-tag">HIGH</span>
          RAM: High
        </div>
        <div class="btn-indicator"></div>
      </button>
      <button class="stress-btn btn-med" onclick="stressRam('med')" id="ram-btn-med">
        <div class="btn-label">
          <span class="btn-level-tag">MED</span>
          RAM: Med
        </div>
        <div class="btn-indicator"></div>
      </button>
      <button class="stress-btn btn-low" onclick="stressRam('low')" id="ram-btn-low">
        <div class="btn-label">
          <span class="btn-level-tag">LOW</span>
          RAM: Low
        </div>
        <div class="btn-indicator"></div>
      </button>
    </div>
  </div>
</div>

<!-- Stop All -->
<div class="stop-all-wrap">
  <button class="stop-all-btn" onclick="stopAll()">
    ■ &nbsp; STOP ALL STRESS
  </button>
</div>

<!-- Activity Log -->
<div class="log-section">
  <div class="log-header">// ACTIVITY LOG</div>
  <div class="log-box" id="log-box"></div>
</div>

<script>
  let activeCpuLevel = null;
  let activeRamLevel = null;

  function now() {
    return new Date().toTimeString().slice(0,8);
  }

  function addLog(msg, type = 'info') {
    const box = document.getElementById('log-box');
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${msg}</span>`;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  function clearCpuActive() {
    ['high','med','low'].forEach(l => {
      document.getElementById(`cpu-btn-${l}`).classList.remove('active');
    });
  }
  function clearRamActive() {
    ['high','med','low'].forEach(l => {
      document.getElementById(`ram-btn-${l}`).classList.remove('active');
    });
  }

  async function stressCpu(level) {
    clearCpuActive();
    document.getElementById(`cpu-btn-${level}`).classList.add('active');
    activeCpuLevel = level;
    await fetch(`/api/stress/cpu/${level}`, { method: 'POST' });
    const labels = { high: 'HIGH (~100%)', med: 'MEDIUM (~50%)', low: 'LOW (~20%)' };
    const types  = { high: 'danger', med: 'warn', low: 'ok' };
    addLog(`CPU stress started → ${labels[level]}`, types[level]);
  }

  async function stressRam(level) {
    clearRamActive();
    document.getElementById(`ram-btn-${level}`).classList.add('active');
    activeRamLevel = level;
    await fetch(`/api/stress/ram/${level}`, { method: 'POST' });
    const labels = { high: 'HIGH (~75% RAM)', med: 'MEDIUM (~40% RAM)', low: 'LOW (~15% RAM)' };
    const types  = { high: 'danger', med: 'warn', low: 'ok' };
    addLog(`RAM stress started → ${labels[level]}`, types[level]);
  }

  async function stopAll() {
    clearCpuActive();
    clearRamActive();
    activeCpuLevel = null;
    activeRamLevel = null;
    await fetch('/api/stop/all', { method: 'POST' });
    addLog('All stress stopped', 'stop');
  }

  function applyLevel(val, valEl, barEl) {
    const isWarn   = val >= 50 && val < 80;
    const isDanger = val >= 80;
    valEl.classList.toggle('warn',   isWarn);
    valEl.classList.toggle('danger', isDanger);
    barEl.classList.toggle('warn',   isWarn);
    barEl.classList.toggle('danger', isDanger);
  }

  async function updateStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();

      const cpuVal = document.getElementById('cpu-val');
      const cpuBar = document.getElementById('cpu-bar');
      cpuVal.innerHTML = `${d.cpu_percent}<span style="font-size:1.4rem;font-weight:300">%</span>`;
      cpuBar.style.width = `${d.cpu_percent}%`;
      applyLevel(d.cpu_percent, cpuVal, cpuBar);

      const ramVal = document.getElementById('ram-val');
      const ramBar = document.getElementById('ram-bar');
      ramVal.innerHTML = `${d.mem_percent}<span style="font-size:1.4rem;font-weight:300">%</span>`;
      ramBar.style.width = `${d.mem_percent}%`;
      applyLevel(d.mem_percent, ramVal, ramBar);

      const cpuDot = document.getElementById('cpu-dot');
      const ramDot = document.getElementById('ram-dot');
      cpuDot.classList.toggle('active', d.cpu_active);
      ramDot.classList.toggle('active', d.ram_active);
      document.getElementById('cpu-status-txt').textContent = d.cpu_active ? 'STRESS ACTIVE' : 'IDLE';
      document.getElementById('ram-status-txt').textContent = d.ram_active ? 'STRESS ACTIVE' : 'IDLE';
    } catch(e) {}
  }

  addLog('System ready. Select a stress level to begin.', 'info');
  setInterval(updateStatus, 2000);
  updateStatus();
</script>
</body>
</html>
